<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neuro Futbol - Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css">
</head>
<body data-role="admin">
  <header class="hero">
    <div class="brand">
      <img class="brand-logo" src="src/logo-neuro-futbol.png" alt="Neuro Futbol">
      <div>
        <h1>Panel Admin</h1>
        <p>Iniciá sesión para gestionar turnos y usuarios de familias.</p>
      </div>
    </div>
    <nav class="top-nav"><a href="index.html">Volver</a></nav>
  </header>

  <main>
    <section id="adminLoginPanel" class="login-gate">
      <h2>Acceso admin</h2>
      <div class="form-row">
        <input id="adminUsername" placeholder="usuario" value="admin">
        <input id="adminPassword" type="password" placeholder="contraseña">
        <button id="adminLoginBtn">Ingresar</button>
        <button id="adminLogoutBtn" type="button">Salir</button>
      </div>
      <small id="adminSessionStatus"></small>
    </section>

    <div id="adminProtected">
      <section class="toolbar">
        <button id="reloadBtn">Actualizar turnos</button>
      </section>

      <section id="schedules"></section>

      <section id="calendarPanel">
        <h2>Calendario mensual</h2>
        <div class="calendar-toolbar">
          <button id="calendarPrevBtn" type="button">Mes anterior</button>
          <strong id="calendarMonthLabel"></strong>
          <button id="calendarNextBtn" type="button">Mes siguiente</button>
        </div>
        <div id="adminCalendarGrid" class="calendar-grid"></div>
      </section>

      <section id="adminPanel">
        <h2>Agregar turno</h2>
        <div class="form-row">
          <input id="newCategory" placeholder="Categoría (ej. 2016)">
          <input id="newDate" type="date" placeholder="Fecha">
          <input id="newTime" type="time" step="3600" placeholder="Hora en punto">
          <button id="addScheduleBtn">Agregar turno</button>
        </div>
      </section>

      <section id="familyAdminPanel">
        <h2>Alta de usuario familia</h2>
        <div class="form-row">
          <input id="familyNewUsername" placeholder="usuario familia">
          <input id="familyNewPin" placeholder="código 4 dígitos" inputmode="numeric" maxlength="4">
          <input id="familyNewCategory" placeholder="categoría (ej. 2016)">
          <button id="createFamilyBtn">Guardar usuario</button>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="src/app.js"></script>
</body>
</html>
