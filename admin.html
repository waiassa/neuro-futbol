<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neuro Futbol - Admin</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body data-role="admin">
  <header>
    <h1>Panel Admin</h1>
    <p>Iniciá sesión para gestionar turnos.</p>
    <nav><a href="index.html">Volver</a></nav>
  </header>

  <main>
    <section class="toolbar">
      <button id="reloadBtn">Actualizar turnos</button>
    </section>

    <section id="schedules"></section>

    <section id="adminLoginPanel">
      <h2>Acceso admin</h2>
      <div class="form-row">
        <input id="adminUsername" placeholder="usuario" value="admin">
        <input id="adminPassword" type="password" placeholder="contraseña">
        <button id="adminLoginBtn">Ingresar</button>
        <button id="adminLogoutBtn" type="button">Salir</button>
      </div>
      <small id="adminSessionStatus"></small>
    </section>

    <section id="adminPanel">
      <h2>Agregar turno</h2>
      <div class="form-row">
        <input id="newCategory" placeholder="Categoría (ej. 2016)">
        <input id="newDay" placeholder="Día (Lunes)">
        <input id="newTime" placeholder="Horario (18:30)">
        <button id="addScheduleBtn">Agregar turno</button>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="src/app.js"></script>
</body>
</html>
